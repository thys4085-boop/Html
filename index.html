<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VukaRide</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

input, select {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
}

button {
  width: 95%;
  padding: 15px;
  background: #25D366;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

.price-box {
  margin: 10px;
  font-size: 18px;
  color: #22c55e;
}
</style>
</head>

<body>

<h1>🚗 VukaRide</h1>
<p>Smart WhatsApp Ride Booking</p>

<div class="container">

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="pickup" placeholder="Pickup Location">
<input type="text" id="dropoff" placeholder="Drop-off Location">

<select id="distance">
  <option value="5">Short (0–5 km)</option>
  <option value="10">Medium (5–10 km)</option>
  <option value="20">Long (10–20 km)</option>
</select>

<div class="price-box" id="price">Estimated Price: R0</div>

<button onclick="calculatePrice()">Calculate Price</button>
<button onclick="bookRide()">Book via WhatsApp</button>

</div>

<script>
// Fake drivers (MVP level)
const drivers = ["Sipho", "Thabo", "Mike", "John"];

function calculatePrice() {
  let distance = document.getElementById("distance").value;
  
  let baseFare = 20;
  let perKm = 10;

  let price = baseFare + (distance * perKm);

  document.getElementById("price").innerText = "Estimated Price: R" + price;
}

function getDriver() {
  return drivers[Math.floor(Math.random() * drivers.length)];
}

function bookRide() {
  let name = document.getElementById("name").value;
  let pickup = document.getElementById("pickup").value;
  let dropoff = document.getElementById("dropoff").value;
  let distance = document.getElementById("distance").value;

  let driver = getDriver();

  let price = 20 + (distance * 10);

  let phone = "27760175307";

  let message = `🚗 VukaRide Booking
Name: ${name}
Pickup: ${pickup}
Drop-off: ${dropoff}
Distance: ${distance} km
Price: R${price}
Driver Assigned: ${driver}`;

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, '_blank');
}
</script>

</body>
</html>
