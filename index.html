<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VukaRide</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
  color: #22c55e;
}

input, select {
  width: 95%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  background: #25D366;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #1ebe5d;
}

.price {
  font-size: 20px;
  margin: 10px 0;
  color: #22c55e;
}

.info {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>🚗 VukaRide</h1>
<p>Fast • Local • Reliable</p>

<div class="container">

<input id="name" placeholder="Your Name">
<input id="pickup" placeholder="Pickup Location">
<input id="dropoff" placeholder="Drop-off Location">

<select id="distance">
  <option value="5">0–5 km</option>
  <option value="10">5–10 km</option>
  <option value="20">10–20 km</option>
</select>

<div class="price" id="price">Price: R0</div>

<button onclick="calc()">Calculate Price</button>
<button onclick="book()">Book Ride</button>

<p class="info">Driver will contact you via WhatsApp</p>

</div>

<script>
const drivers = ["Sipho", "Thabo", "Mike"];

function calc() {
  let d = document.getElementById("distance").value;
  let price = 20 + (d * 10);
  document.getElementById("price").innerText = "Price: R" + price;
}

function book() {
  let name = document.getElementById("name").value;
  let pickup = document.getElementById("pickup").value;
  let dropoff = document.getElementById("dropoff").value;
  let d = document.getElementById("distance").value;

  let driver = drivers[Math.floor(Math.random() * drivers.length)];
  let price = 20 + (d * 10);

  let msg = `🚗 VukaRide Booking
Name: ${name}
Pickup: ${pickup}
Drop-off: ${dropoff}
Distance: ${d} km
Price: R${price}
Driver: ${driver}`;

  let url = "https://wa.me/27760175307?text=" + encodeURIComponent(msg);
  window.open(url);
}
</script>

</body>
</html>
