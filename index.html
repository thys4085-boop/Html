<!DOCTYPE html>
<html>
<head>
  <title>VukaRide MVP</title>
</head>
<body>
  <h1>VukaRide</h1>
  <p>Map Loading...</p>
  <input placeholder="Pickup location">
  <input placeholder="Drop-off location">
  <p>Estimated Fare R45 - R70</p>
  <p>Standard Ride R50</p>
  <p>XL Ride R80</p>
  <button onclick="requestRide()">Request Ride</button>
  <p id="status"></p>

  <script>
    function requestRide() {
      const status = document.getElementById('status');
      status.innerText = 'Searching for driver...';
      setTimeout(() => {
        status.innerText = 'Driver found! Arriving in 5 mins.';
      }, 3000);
    }
  </script>
</body>
</html>
